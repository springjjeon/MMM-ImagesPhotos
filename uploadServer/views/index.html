
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매직미러 사진 올리기</title>
    <style>
        /* General styles */
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 20px; margin-top: 0; }
        input[type="file"] { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 80%; background: #fafafa; }
        
        /* Upload Button */
        .upload-btn { padding: 15px 30px; font-size: 18px; background: #007BFF; color: white; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; transition: background-color 0.2s; }
        .upload-btn:hover { background: #0056b3; }

        /* Toolbar buttons */
        .toolbar-btn { padding: 12px; font-size: 14px; color: white; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 500; transition: background-color 0.2s; }
        .show-all-btn { background: #28a745; }
        .show-all-btn:hover { background: #218838; }
        .hide-all-btn { background: #fd7e14; }
        .hide-all-btn:hover { background: #e06200; }

        /* Folder List */
        .folder-list { list-style: none; padding: 0; text-align: left; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; margin-top: 20px;}
        .folder-item { border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; transition: background-color 0.2s ease; padding-right: 15px; }
        .folder-item:last-child { border-bottom: none; }
        .folder-item:hover { background-color: #f0f7ff; }
        
        .folder-item.is-hidden .folder-name { color: #999; text-decoration: line-through; font-weight: normal; }
        .folder-item.is-hidden .folder-icon { opacity: 0.5; }
        
        .folder-info { display: flex; align-items: center; gap: 8px; padding: 12px 0 12px 15px; }
        .folder-name { font-size: 16px; font-weight: 500; color: #333; }
        .folder-icon { color: #5dade2; }

        .folder-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: inherit;
        }
        .folder-item:hover .folder-name {
            text-decoration: underline;
        }

        .toggle-icon { cursor: pointer; display: inline-flex; justify-content: center; align-items: center; width: 20px; height: 20px; font-size: 12px; color: #777; user-select: none; border-radius: 4px; }
        .toggle-icon:hover { background-color: #e9e9e9; }
        .folder-actions { display: flex; gap: 8px; }

        /* Action Buttons in list */
        .action-btn { padding: 6px 12px; font-size: 13px; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; transition: background-color 0.2s; }
        .manage-btn { background: #007BFF; }
        .manage-btn:hover { background: #0056b3; }
        .toggle-btn.show-btn { background: #28a745; }
        .toggle-btn.show-btn:hover { background: #218838; }
        .toggle-btn.hide-btn { background: #fd7e14; }
        .toggle-btn.hide-btn:hover { background: #e06200; }

        /* File list preview */
        #file-list-container {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 20px;
            text-align: left;
            background-color: #f9f9f9;
        }
        .file-item {
            padding: 6px 10px;
            font-size: 14px;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        .file-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📸 매직미러 사진 올리기</h2>
        <form action="/upload" method="post" enctype="multipart/form-data">
            <p style="color: #666; font-size: 14px;">한 번에 여러 장을 선택할 수 있습니다.</p>
            
            <!-- 폴더 선택 섹션 -->
            <div style="margin: 20px 0; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px solid #e0e0e0;">
                <label for="folderSelect" style="display: block; margin-bottom: 12px; font-weight: 500; color: #333;">
                    📁 사진을 저장할 폴더 선택
                </label>
                <div style="margin-bottom: 10px;">
                    <select name="folderName" id="folderSelect" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px;">
                        {{folderOptions}}
                    </select>
                </div>
                <div id="customFolderContainer" style="display: none;">
                    <input type="text" name="customFolder" id="customFolder" placeholder="새 폴더명 입력 (예: 우리집 강아지)"
                           style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px;">
                </div>
            </div>
            
            <input type="file" name="photos" id="photo-input" accept="image/*,video/*" multiple required>
            <div id="file-list-container"></div>
            <p style="color: #666; font-size: 12px; margin-top: 8px;">지원 확장자: jpg, png, gif, heic, mp4, webm, ogg, mov</p>
            <button type="submit" class="upload-btn">전송하기 🚀</button>
        </form>
    </div>

    <div class="container" style="padding-top: 20px; padding-bottom: 20px; text-align: left;">
        <h3 style="margin-top: 0; margin-bottom: 15px; color: #333;">⚙️ 시스템 관리</h3>
        <div id="restart-container" style="display: flex; align-items: flex-start; gap: 10px;">
            <button type="button" id="restart-mm-btn" class="toolbar-btn" style="background-color: #6c757d; width: auto; padding: 12px 20px;">
                🔄 MagicMirror 재시작
            </button>
            <form action="/manage/convert-all-videos" method="post" onsubmit="return confirm('모든 동영상을 검사하고 필요한 경우 변환합니다. 시스템에 부하를 줄 수 있으며, 시간이 다소 걸릴 수 있습니다. 계속하시겠습니까?');">
                <button type="submit" class="toolbar-btn" style="background-color: #fd7e14; width: auto; padding: 12px 20px;">
                    📹 모든 동영상 변환
                </button>
            </form>
            <p id="restart-status" style="display: none; color: #333; margin-top: 10px; font-weight: 500;"></p>
        </div>
    </div>
    
    {{folderListHtml}}

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Handle status notifications from redirects
            const urlParams = new URLSearchParams(window.location.search);
            const status = urlParams.get('status');
            if (status) {
                let message = '';
                if (status === 'conversion_started') {
                    message = '동영상 변환 작업이 백그라운드에서 시작되었습니다. 완료되면 서버 로그를 확인하세요.';
                } else if (status === 'conversion_running') {
                    message = '이미 동영상 변환 작업이 진행 중입니다.';
                }
                if (message) {
                    alert(message);
                }
                // Clean the URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });

        const folderSelect = document.getElementById('folderSelect');
        const customFolderInput = document.getElementById('customFolder');
        const customFolderContainer = document.getElementById('customFolderContainer');
        const restartBtn = document.getElementById('restart-mm-btn');
        const restartStatus = document.getElementById('restart-status');
        const photoInput = document.getElementById('photo-input');
        const fileListContainer = document.getElementById('file-list-container');

        if (photoInput && fileListContainer) {
            photoInput.addEventListener('change', function() {
                // Clear previous list
                fileListContainer.innerHTML = '';

                if (this.files && this.files.length > 0) {
                    // Show container only when files are selected
                    fileListContainer.style.display = 'block';
                    
                    for (const file of this.files) {
                        const fileItem = document.createElement('div');
                        fileItem.className = 'file-item';
                        fileItem.textContent = `📄 ${file.name}`;
                        fileListContainer.appendChild(fileItem);
                    }
                } else {
                    fileListContainer.style.display = 'none';
                }
            });
            // Initially hide the container
            fileListContainer.style.display = 'none';
        }

        if(restartBtn) {
            restartBtn.addEventListener('click', () => {
                if (!confirm('MagicMirror를 재시작하시겠습니까?')) {
                    return;
                }

                restartBtn.disabled = true;
                restartStatus.style.display = 'block';
                restartStatus.style.color = '#333';
                restartStatus.textContent = '🔄 재시작 명령을 보냈습니다. 잠시만 기다려주세요...';

                fetch('/manage/restart-mm', {
                    method: 'POST'
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Server responded with status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        restartStatus.style.color = '#28a745';
                        restartStatus.textContent = '✅ 성공! 5초 후 페이지를 새로고침합니다.';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 5000);
                    } else {
                        throw new Error(data.message || 'Restart failed. Check server logs.');
                    }
                })
                .catch(error => {
                    console.error('Error restarting MagicMirror:', error);
                    restartStatus.style.color = '#dc3545';
                    restartStatus.textContent = '❌ 오류 발생! 서버 로그를 확인해주세요.';
                    restartBtn.disabled = false;
                });
            });
        }
        
        function toggleCustomFolderInput() {
            if (folderSelect.value === '') {
                customFolderContainer.style.display = 'block';
                customFolderInput.focus();
            } else {
                customFolderContainer.style.display = 'none';
                customFolderInput.value = '';
            }
        }

        if (folderSelect && customFolderInput && customFolderContainer) {
            // 페이지 로드 시 초기 상태 확인
            toggleCustomFolderInput();

            // 드롭다운 변경 시 customFolder 입력 필드 표시/숨김
            folderSelect.addEventListener('change', toggleCustomFolderInput);
        }

        // 하위 폴더 접기/펼치기 토글 함수
        function toggleFolder(path, element) {
            const li = element.closest('li');
            li.classList.toggle('collapsed');
            const isCollapsed = li.classList.contains('collapsed');
            element.innerText = isCollapsed ? '▶' : '▼';
            updateVisibility();
        }

        // 접힌 폴더의 모든 하위 항목을 찾아 숨기는 함수
        function updateVisibility() {
            const rows = document.querySelectorAll('li[data-path]');
            const collapsedPaths = Array.from(rows)
                .filter(r => r.classList.contains('collapsed'))
                .map(r => r.getAttribute('data-path') + '/');
            
            rows.forEach(row => {
                const path = row.getAttribute('data-path');
                const isHidden = collapsedPaths.some(cp => path.startsWith(cp));
                row.style.display = isHidden ? 'none' : 'flex';
            });
        }
    </script>
</body>
</html>
